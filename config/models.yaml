# Model configurations for each provider

openai:
  provider: "openai"
  model_name: "gpt-5.5"
  temperature: 0.7
  max_tokens: 2048
  # api_key: from OPENAI_API_KEY env var
  # base_url: from OPENAI_BASE_URL env var (optional)

deepseek:
  provider: "deepseek"
  model_name: "deepseek-chat"
  temperature: 0.7
  max_tokens: 4096
  base_url: "https://api.deepseek.com"
  # api_key: from DEEPSEEK_API_KEY env var
