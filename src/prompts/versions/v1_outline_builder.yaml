  {arguments}

  ## Writing Reference Library

  {rag_context}

  ## Task

  Build a four-paragraph outline based on the selected writing path. The outline must be suitable for a Band 6.5-7 learner and should help the learner understand paragraph logic in Chinese before writing in English.

  Return only these learner-facing sections:

